<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Page</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="icon" href="/Images/ShopEasyLogo.png" />

    <style>
      body {
        text-align: center;
      }

      .p-5 {
        border-radius: 10px;
      }

      .p-5:hover {
        transform: scale(1.05);
        transition: transform 0.3s;
      }
      .price {
        color: lightgreen;
        font-weight: bold;
      }

      .p-5 img {
        border-radius: 5px;
        margin-bottom: 10px;
      }

      .btn-contact {
        margin-bottom: 50px;
      }
      .row.mb-3 {
        width: 50%;
        margin: 0 auto;
      }
      h3 {
        margin-bottom: 20px;
      }

      footer {
        background-color: black;
        color: white;
      }
      label[for] {
        font-size: 20px;
      }
      img {
        width: 100px;
        height: 100px;
        border-radius: 10px;
      }
      .form-logo {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        margin-bottom: 20px;
      }
    </style>
  </head>

  <body>
    <main>
      <h1 class="text-center">Shop Our Products</h1>

      <div class="container-lg my-5">
        <div class="row g-4 justify-content-center">
          <!-- Product 1 -->
          <div class="col-sm-6 col-md-4 col-lg-3">
            <div class="p-5 bg-primary text-light">
              <img
                src="https://cdn.sandberg.world/products/images/rt/136-41_rt.jpg"
                alt="USB-C Hub"
                class="img-fluid"
              />
              <h5>USB-C Hub</h5>
              <p class="price">£19.99</p>
              <button class="btn btn-light">Buy</button>
            </div>
          </div>

          <!-- Product 2 -->
          <div class="col-sm-6 col-md-4 col-lg-3">
            <div class="p-5 bg-primary text-light">
              <img
                src="https://m.media-amazon.com/images/I/71ndYjnkH5L.jpg"
                alt="Smart Watch"
                class="img-fluid"
              />
              <h5>Smart Watch</h5>
              <p class="price">£89.99</p>
              <button class="btn btn-light">Buy</button>
            </div>
          </div>

          <!-- Product 3 -->
          <div class="col-sm-6 col-md-4 col-lg-3">
            <div class="p-5 bg-primary text-light">
              <img
                src="https://www.sportsdirect.com/images/imgzoom/75/75519303_xxl.jpg"
                alt="Bluetooth Speaker"
                class="img-fluid"
              />
              <h5>Bluetooth Speaker</h5>
              <p class="price">£39.99</p>
              <button class="btn btn-light">Buy</button>
            </div>
          </div>

          <!-- Product 4 -->
          <div class="col-sm-6 col-md-4 col-lg-3">
            <div class="p-5 bg-primary text-light">
              <img
                src="https://i.ebayimg.com/00/s/MTM2MFgxNTAw/z/TIAAAOSw1uBj9PK8/$_57.JPG?set_id=8800005007"
                alt="Laptop Stand"
                class="img-fluid"
              />
              <h5>Laptop Stand</h5>
              <p class="price">£24.99</p>
              <button class="btn btn-light">Buy</button>
            </div>
          </div>

          <!-- Product 5 -->
          <div class="col-sm-6 col-md-4 col-lg-3">
            <div class="p-5 bg-primary text-light">
              <img
                src="https://store.storeimages.cdn-apple.com/1/as-images.apple.com/is/MQTQ3?wid=1144&hei=1144&fmt=jpeg&qlt=90&.v=dkp4djAxbnA1NnpYWDIvVklnLzRpUWtuVHYzMERCZURia3c5SzJFOTlPZ3oveDdpQVpwS0ltY2w2UW05aU90T1lYTmlwOFY3ZXdFd0FRY2dWaUc5UlE"
                alt="Wireless Headphones"
                class="img-fluid"
              />
              <h5>Wireless Headphones</h5>
              <p class="price">£59.99</p>
              <button class="btn btn-light">Buy</button>
            </div>
          </div>

          <!-- Product 6 -->
          <div class="col-sm-6 col-md-4 col-lg-3">
            <div class="p-5 bg-primary text-light">
              <img
                src="https://m.media-amazon.com/images/I/61QY3V6A-NL.jpg"
                alt="Gaming Mouse"
                class="img-fluid"
              />
              <h5>Gaming Mouse</h5>
              <p class="price">£29.99</p>
              <button class="btn btn-light">Buy</button>
            </div>
          </div>

          <!-- Product 7 -->
          <div class="col-sm-6 col-md-4 col-lg-3">
            <div class="p-5 bg-primary text-light">
              <img
                src="https://m.media-amazon.com/images/I/71fRP7KY9hL._AC_SL1000__.jpg"
                alt="Mechanical Keyboard"
                class="img-fluid"
              />
              <h5>Mechanical Keyboard</h5>
              <p class="price">£79.99</p>
              <button class="btn btn-light">Buy</button>
            </div>
          </div>

          <!-- Product 8 -->
          <div class="col-sm-6 col-md-4 col-lg-3">
            <div class="p-5 bg-primary text-light">
              <img
                src="https://m.media-amazon.com/images/I/61srjyM7TFL._AC_UF894,1000_QL80_.jpg"
                alt="Phone Stand"
                class="img-fluid"
              />
              <h5>Phone Stand</h5>
              <p class="price">£9.99</p>
              <button class="btn btn-light">Buy</button>
            </div>
          </div>

          <!-- Product 9 -->
          <div class="col-sm-6 col-md-4 col-lg-3">
            <div class="p-5 bg-primary text-light">
              <img
                src="https://ghostek.co.uk/cdn/shop/files/NRGpak-R207_1_1200x1200.jpg?v=1724773772"
                alt="Portable Charger"
                class="img-fluid"
              />
              <h5>Portable Charger</h5>
              <p class="price">£34.99</p>
              <button class="btn btn-light">Buy</button>
            </div>
          </div>

          <!-- Product 10 -->
          <div class="col-sm-6 col-md-4 col-lg-3">
            <div class="p-5 bg-primary text-light">
              <img
                src="https://www.anglepoise.com/wp-content/uploads/2021/12/T75-desk-lamp-black.jpg"
                alt="Desk Lamp"
                class="img-fluid"
              />
              <h5>Desk Lamp</h5>
              <p class="price">£22.99</p>
              <button class="btn btn-light">Buy</button>
            </div>
          </div>
        </div>
      </div>
      <footer>
        <div class="form-logo">
          <h3>Contact Us</h3>
          <img src="./ShopEasyLogo.png" alt="website logo" />
        </div>
        <form>
          <div class="row mb-3">
            <label for="inputEmail" class="col-sm-2 col-form-label"
              >Email:</label
            >
            <div class="col-sm-10">
              <input
                type="email"
                class="form-control"
                id="inputEmail"
                name="email"
                placeholder="someone@email.com"
                required
              />
            </div>
          </div>
          <div class="row mb-3">
            <label for="inputName" class="col-sm-2 col-form-label">Name:</label>
            <div class="col-sm-10">
              <input
                type="text"
                class="form-control"
                id="inputName"
                name="name"
                placeholder="e.g. John Doe"
                required
              />
            </div>
          </div>
          <div class="row mb-3">
            <label for="inputTel" class="col-sm-2 col-form-label"
              >Telephone:</label
            >
            <div class="col-sm-10">
              <input
                type="tel"
                class="form-control"
                id="inputTel"
                name="telephone"
                placeholder="+44 7800 767225"
                required
              />
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-contact">
            Send Details
          </button>
        </form>
      </footer>
    </main>
  </body>
</html>
